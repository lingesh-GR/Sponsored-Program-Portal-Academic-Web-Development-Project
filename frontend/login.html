<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sponsored Program Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

  <div class="auth-container">

    <!-- ========== LEFT — BRANDING ========== -->
    <div class="brand-panel">
      <div class="brand-logo">🎓</div>
      <h1 class="brand-title">Sponsored Program Portal</h1>
      <p class="brand-tagline">Empowering students with government schemes, internships & events</p>
    </div>

    <!-- ========== RIGHT — FORM ========== -->
    <div class="form-panel">
      <div class="card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your account</p>

        <!-- Email -->
        <div class="form-group input-wrapper">
          <span class="input-icon">📧</span>
          <input id="email" type="text" placeholder="Email address" autocomplete="off" />
          <div id="suggestions" class="suggestions"></div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Password">
          <span class="eye-toggle" id="toggleLogin">👁️</span>
        </div>

        <!-- Remember me + Forgot link -->
        <div class="auth-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="forgot.html">Forgot password?</a>
        </div>

        <!-- Error -->
        <p id="error" class="error"></p>

        <!-- Button -->
        <button class="auth-btn" onclick="login()">Sign In</button>

        <!-- Register link -->
        <div class="auth-links">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>

</html>
